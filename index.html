<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Weatherization Help Finder — NH Community Loan Fund</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      /* NHCLF brand green extracted from logo */
      --brand:   #1e4d2b;
      --brand-d: #122d19;
      --brand-m: #2a6b3c;
      --brand-l: #3d8f55;
      --brand-t: #c8dfd0;
      --brand-s: #e8f3ec;
      --brand-f: #f2f8f4;
 
      /* Accent — warm cream echoing logo's off-white elements */
      --cream:   #f5f1e8;
      --cream-d: #e8e0cc;
 
      /* Amber / warm tones for secondary highlights */
      --amber:   #d4860a;
      --amber-l: #fdf0d5;
      --amber-b: #f0c464;
 
      /* Blue for NHCLF loan card */
      --blue:    #1a4f7a;
      --blue-l:  #e8f0f8;
      --blue-b:  #93bce0;
 
      /* Neutrals */
      --tx:  #1a2b1d;
      --mu:  #5a6e5e;
      --br:  #c2d4c9;
      --bg:  #f6faf7;
      --wh:  #ffffff;
    }
 
    html { height: 100%; }
    body {
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--tx);
      -webkit-font-smoothing: antialiased;
    }
 
    #app {
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }
 
    /* ── HEADER ── */
    .hdr {
      padding: 18px 20px 16px;
      background: var(--wh);
      border-bottom: 2px solid var(--brand-t);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
    }
 
    .hdr-logo {
      height: 120px;
      width: auto;
      display: block;
    }
 
    .hdr-link {
      display: block;
      line-height: 0;
      flex-shrink: 0;
    }
 
    .hdr-tag {
      font-size: 17px;
      color: var(--brand);
      font-weight: 700;
      text-align: right;
      line-height: 1.3;
      margin-left: 8px;
    }
 
    .back-btn {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--brand-m);
      cursor: pointer;
      padding: 12px 0 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }
    .back-btn:hover { color: var(--brand); }
 
    /* ── PROGRESS ── */
    .prog-wrap {
      padding: 14px 20px 0;
    }
    .prog-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }
    .prog-step-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--brand-m);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .prog-count {
      font-size: 11px;
      color: var(--mu);
    }
    .prog-track {
      height: 3px;
      background: var(--brand-t);
      border-radius: 2px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: var(--brand);
      border-radius: 2px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }
 
    /* ── SCREEN ── */
    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 20px 40px;
      animation: fadeSlide .26s ease;
    }
    .screen.rev { animation: fadeSlideRev .26s ease; }
 
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(18px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeSlideRev {
      from { opacity: 0; transform: translateX(-18px); }
      to   { opacity: 1; transform: translateX(0); }
    }
 
    /* ── WELCOME ── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-top: 28px;
    }
 
    .hero-band {
      background: var(--brand);
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
 
    .hero-band::after {
      content: '';
      position: absolute;
      right: -20px;
      bottom: -20px;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,.04);
      border-radius: 50%;
    }
 
    .hero-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--brand-t);
      margin-bottom: 12px;
      display: block;
    }
 
    .hero-h {
      font-family: 'Fraunces', serif;
      font-size: clamp(24px, 6.5vw, 30px);
      font-weight: 700;
      line-height: 1.18;
      color: var(--wh);
      margin-bottom: 12px;
    }
 
    .hero-p {
      font-size: 14px;
      line-height: 1.65;
      color: rgba(255,255,255,.72);
    }
 
    .how-it-works {
      margin-bottom: 28px;
    }
 
    .how-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--mu);
      margin-bottom: 14px;
    }
 
    .step-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
 
    .step-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--brand-s);
      border: 1.5px solid var(--brand-t);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--brand);
      flex-shrink: 0;
      margin-top: 1px;
    }
 
    .step-text {
      font-size: 14px;
      color: var(--tx);
      line-height: 1.5;
    }
 
    .step-text strong {
      font-weight: 500;
    }
 
    /* ── QUESTION ── */
    .q-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px 0 16px;
    }
 
    .q-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--brand-m);
      margin-bottom: 10px;
    }
 
    .q-text {
      font-family: 'Fraunces', serif;
      font-size: clamp(21px, 5.5vw, 27px);
      font-weight: 600;
      line-height: 1.25;
      color: var(--tx);
      margin-bottom: 10px;
    }
 
    .q-hint {
      font-size: 14px;
      line-height: 1.65;
      color: var(--mu);
      margin-bottom: 26px;
    }
 
    .q-hint strong { color: var(--tx); font-weight: 500; }
 
    /* ── BUTTONS ── */
    .btn-cta {
      display: block;
      width: 100%;
      padding: 18px 24px;
      background: var(--brand);
      color: var(--wh);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-cta:hover { background: var(--brand-m); }
    .btn-cta:active { transform: scale(.98); }
 
    .ans-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 62px;
      padding: 15px 18px;
      background: var(--wh);
      border: 1.5px solid var(--br);
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      margin-bottom: 10px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .15s, background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
 
    .ans-lbl { flex: 1; }
    .ans-lbl-main { font-size: 15px; font-weight: 500; color: var(--tx); line-height: 1.35; display: block; }
    .ans-lbl-sub  { font-size: 12px; color: var(--mu); margin-top: 3px; line-height: 1.4; display: block; }
    .ans-chev { flex-shrink: 0; margin-left: 12px; color: var(--brand-l); font-size: 20px; }
 
    .ans-btn:hover { border-color: var(--brand-l); background: var(--brand-f); }
    .ans-btn:hover .ans-chev { color: var(--brand); }
    .ans-btn:active { transform: scale(.98); }
 
    /* size grid */
    .size-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 6px;
    }
    .size-btn {
      aspect-ratio: 1;
      min-height: 58px;
      background: var(--wh);
      border: 1.5px solid var(--br);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--tx);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .size-btn:hover { border-color: var(--brand-m); background: var(--brand-f); color: var(--brand); }
    .size-btn:active { transform: scale(.93); }
 
    /* income card */
    .inc-card {
      background: var(--brand-s);
      border: 1px solid var(--brand-t);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 20px;
    }
    .inc-lbl { font-size: 12px; color: var(--mu); margin-bottom: 2px; }
    .inc-amt {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--brand);
      line-height: 1.2;
    }
    .inc-mo { font-size: 12px; color: var(--mu); margin-top: 3px; }
 
    /* ── NOT ROC ── */
    .not-roc-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 0;
      gap: 14px;
    }
    .not-roc-wrap h2 {
      font-family: 'Fraunces', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--tx);
    }
    .not-roc-wrap p { font-size: 15px; color: var(--mu); line-height: 1.65; max-width: 340px; }
    .link-btn {
      display: inline-block;
      padding: 14px 28px;
      background: var(--brand);
      color: var(--wh);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      border-radius: 10px;
      text-decoration: none;
      transition: background .15s;
    }
    .link-btn:hover { background: var(--brand-m); }
    .ghost-btn {
      background: none; border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--mu);
      cursor: pointer; text-decoration: underline; padding: 8px;
    }
 
    /* ── RESULTS ── */
    .res-intro {
      padding: 20px 0 6px;
    }
    .res-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--brand-m);
      margin-bottom: 8px;
      display: block;
    }
    .res-h {
      font-family: 'Fraunces', serif;
      font-size: clamp(22px, 5.5vw, 27px);
      font-weight: 700;
      color: var(--tx);
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .res-sub {
      font-size: 14px;
      color: var(--mu);
      line-height: 1.65;
      margin-bottom: 22px;
    }
 
    /* program group card */
    .group-card {
      border-radius: 14px;
      margin-bottom: 14px;
      overflow: hidden;
      border: 1.5px solid;
    }
    .group-card.green  { border-color: var(--brand-t); background: var(--wh); }
    .group-card.amber  { border-color: var(--amber-b); background: var(--amber-l); }
    .group-card.blue   { border-color: var(--blue-b);  background: var(--blue-l); }
    .group-card.muted  { border-color: var(--br);      background: var(--bg); }
 
    .gc-head {
      padding: 14px 16px 12px;
      border-bottom: 1px solid;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .group-card.green .gc-head  { border-color: var(--brand-t); }
    .group-card.amber .gc-head  { border-color: #e8c97a; }
    .group-card.blue  .gc-head  { border-color: var(--blue-b); }
    .group-card.muted .gc-head  { border-color: var(--br); }
 
    .gc-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .group-card.green .gc-icon  { background: var(--brand-s); }
    .group-card.amber .gc-icon  { background: #faecd0; }
    .group-card.blue  .gc-icon  { background: #ddeaf6; }
    .group-card.muted .gc-icon  { background: var(--cream); }
 
    .gc-head-text { flex: 1; }
    .gc-who {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .group-card.green .gc-who  { color: var(--brand); }
    .group-card.amber .gc-who  { color: var(--amber); }
    .group-card.blue  .gc-who  { color: var(--blue); }
    .group-card.muted .gc-who  { color: var(--mu); }
 
    .gc-prog { font-size: 15px; font-weight: 500; color: var(--tx); line-height: 1.3; }
 
    .gc-body { padding: 14px 16px; }
 
    .gc-what {
      font-size: 13px;
      color: var(--mu);
      line-height: 1.65;
      margin-bottom: 10px;
    }
 
    .gc-list {
      list-style: none;
      margin-bottom: 12px;
    }
    .gc-list li {
      font-size: 13px;
      color: var(--mu);
      padding: 3px 0 3px 18px;
      position: relative;
      line-height: 1.5;
    }
    .gc-list li::before {
      content: '✓';
      position: absolute;
      left: 0;
      font-weight: 500;
    }
    .group-card.green .gc-list li::before { color: var(--brand-l); }
    .group-card.amber .gc-list li::before { color: var(--amber); }
    .group-card.blue  .gc-list li::before { color: var(--blue); }
 
    .gc-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .group-card.green .gc-badge { background: var(--brand-t); color: var(--brand); }
    .group-card.amber .gc-badge { background: var(--amber-b); color: var(--amber); }
    .group-card.blue  .gc-badge { background: var(--blue-b);  color: var(--blue); }
    .group-card.muted .gc-badge { background: var(--br);      color: var(--mu); }
 
    .gc-action {
      border-top: 1px solid;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      display: block;
      line-height: 1.5;
    }
    .group-card.green .gc-action { border-color: var(--brand-t); color: var(--brand); }
    .group-card.amber .gc-action { border-color: #e8c97a; color: var(--amber); }
    .group-card.blue  .gc-action { border-color: var(--blue-b); color: var(--blue); }
    .group-card.muted .gc-action { border-color: var(--br); color: var(--mu); }
    .gc-link {
      display: block;
      margin-top: 8px;
      font-size: 17px;
      font-weight: 500;
    }
    .gc-link a {
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .group-card.green .gc-link a { color: var(--brand); }
    .group-card.amber .gc-link a { color: var(--amber); }
    .group-card.blue  .gc-link a { color: var(--blue); }
    .group-card.muted .gc-link a { color: var(--mu); }
 
    /* flow connector */
    .flow-conn {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: -4px 0;
      padding: 0 0 4px;
    }
    .flow-line {
      width: 2px;
      height: 18px;
      background: var(--brand-t);
      border-radius: 1px;
    }
    .flow-label {
      font-size: 11px;
      color: var(--mu);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 10px;
      margin: 2px 0;
      font-style: italic;
    }
 
    /* note */
    .note {
      background: var(--brand-s);
      border-left: 3px solid var(--brand-l);
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: var(--mu);
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .note strong { color: var(--tx); font-weight: 500; }
 
    /* CAA box */
    .caa-box {
      background: var(--brand);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      color: var(--wh);
    }
    .caa-title {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .caa-intro {
      font-size: 13px;
      opacity: .65;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .caa-sel-lbl {
      font-size: 12px;
      font-weight: 500;
      opacity: .8;
      margin-bottom: 6px;
    }
    select.caa-sel {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 9px;
      color: var(--wh);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      margin-bottom: 12px;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }
    select.caa-sel option { background: #1e4d2b; color: #fff; }
 
    .caa-result {
      background: rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 14px;
    }
    .caa-rname  { font-weight: 500; font-size: 14px; opacity: .9; margin-bottom: 5px; }
    .caa-rphone { font-size: 22px; font-weight: 500; letter-spacing: .02em; margin-bottom: 3px; }
    .caa-rhours { font-size: 12px; opacity: .5; }
    .caa-script {
      background: rgba(255,255,255,.07);
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 10px;
      font-size: 12px;
      opacity: .75;
      line-height: 1.5;
      font-style: italic;
    }
 
    .restart-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: none;
      border: 1.5px solid var(--br);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--mu);
      cursor: pointer;
      text-align: center;
      margin: 14px 0;
      transition: all .15s;
    }
    .restart-btn:hover { border-color: var(--brand-l); color: var(--brand); }
 
    .foot-disc {
      font-size: 11px;
      color: var(--mu);
      text-align: center;
      line-height: 1.6;
      opacity: .6;
      padding-bottom: 32px;
    }
 
    /* wider screen card */
    @media (min-width: 540px) {
      body {
        background: var(--cream);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px 16px;
      }
      #app {
        min-height: auto;
        background: var(--bg);
        border-radius: 20px;
        box-shadow: 0 4px 32px rgba(30,77,43,.12);
        overflow: hidden;
        border: 1px solid var(--brand-t);
      }
    }
  </style>
</head>
<body>

  { name:'Belknap',      caa:1 },
  { name:'Carroll',      caa:4 },
  { name:'Cheshire',     caa:3 },
  { name:'Coos',         caa:4 },
  { name:'Grafton',      caa:4 },
  { name:'Hillsborough', caa:0 },
  { name:'Merrimack',    caa:1 },
  { name:'Rockingham',   caa:0 },

  { name:'Sullivan',     caa:3 },
];
 
const STEPS_FULL       = ['roc','county','benefits','size','income','age'];
const STEPS_SHORT      = ['roc','county','benefits','age'];
const STEPS_EVERSOURCE = ['roc','county','benefits','size','income','eversource','age'];
 
let S = { step:'welcome', answers:{}, history:[], dir:'fwd', caa:0 };
 
function fmt(n){ return '$'+Math.round(n).toLocaleString(); }
 
function stepList(){
  if(S.answers.benefits==='yes') return STEPS_SHORT;
  if(S.answers.income==='above') return STEPS_EVERSOURCE;
  return STEPS_FULL;
}
 
function progress(){
  if(S.step==='results'||S.step==='not_roc') return 1;
  const list = stepList(), i = list.indexOf(S.step);
  if(i===-1) return 0;
  return (i+1)/list.length;
}
 
function stepInfo(){
  const list = stepList(), i = list.indexOf(S.step);
  if(i===-1) return null;
  return { cur:i+1, tot:list.length };
}
 
const STEP_LABELS = {
  roc:'Your community', benefits:'Benefits', size:'Household',
  income:'Income', age:'Your age', county:'Your county',
  eversource:'Your utility', results:'Your results'
};
 
function advance(from, val){
  S.history.push({ step:S.step, answers:JSON.parse(JSON.stringify(S.answers)) });
  if(val!==null) S.answers[from] = val;
  const nexts = { welcome:'roc', roc: a=>a.roc==='yes'?'county':'not_roc',
    not_roc:null, county:'benefits', benefits: a=>a.benefits==='yes'?'age':'size',
    size:'income', income: a=>a.income==='above'?'eversource':'age',
    eversource:'age', age:'results', results:null };
  const n = nexts[from];
  S.step = typeof n==='function' ? n(S.answers) : n;
  S.dir = 'fwd';
  render();
  window.scrollTo(0,0);
}
 
function goBack(){
  if(!S.history.length) return;
  const p = S.history.pop();
  S.step = p.step; S.answers = p.answers; S.dir = 'back';
  render(); window.scrollTo(0,0);
}
 
function startOver(){
  S = { step:'welcome', answers:{}, history:[], dir:'fwd', caa:0 };
  render(); window.scrollTo(0,0);
}
 
function selectCAA(i){
  S.caa = parseInt(i);
  const c = CAAS[S.caa], el = document.getElementById('caa-result');
  if(!el) return;
  el.innerHTML = `<div class="caa-rname">${c.name}</div>
    <div class="caa-rphone">📞 ${c.phone}</div>
    <div class="caa-rhours">Monday – Friday &nbsp;·&nbsp; 8:30 am – 4:30 pm</div>`;
}
 
/* ── HEADER ── */
function hdr(){
  return `<header class="hdr">
    <a href="https://communityloanfund.org" target="_blank" rel="noopener noreferrer" class="hdr-link" aria-label="NH Community Loan Fund website">
      <img src="${LOGO_SRC}" alt="NH Community Loan Fund" class="hdr-logo">
    </a>
    <span class="hdr-tag">ROC<br>Weatherization<br>Guide</span>
  </header>`;
}
 
/* ── PROGRESS ── */
function prog(){
  if(S.step==='welcome'||S.step==='not_roc') return '';
  const pct = Math.round(progress()*100);
  const si = stepInfo();
  const lbl = STEP_LABELS[S.step]||'';
  const showBack = S.step!=='results' && S.history.length>0;
  return `<div class="prog-wrap">
    <div class="prog-row">
      <span class="prog-step-label">${lbl}</span>
      ${si?`<span class="prog-count">${si.cur} of ${si.tot}</span>`:''}
    </div>
    <div class="prog-track" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100">
      <div class="prog-fill" style="width:${pct}%"></div>
    </div>
    ${showBack ? `<button class="back-btn" onclick="goBack()" aria-label="Go back to previous question">← Back to previous question</button>` : ''}
  </div>`;
}
 
/* ── SCREENS ── */
function screenWelcome(){
  return `<div class="welcome">
    <div class="hero-band">
      <span class="hero-eyebrow">For NH resident-owned community members</span>
      <h1 class="hero-h">Find free weatherization help for your home</h1>
      <p class="hero-p">Answer a few short questions. We'll show you exactly which programs are available to you and who to call.</p>
    </div>
    <div class="how-it-works">
      <div class="how-label">How this works</div>
      <div class="step-row"><div class="step-num">1</div><div class="step-text">Answer <strong>3–5 short questions</strong> about your household</div></div>
      <div class="step-row"><div class="step-num">2</div><div class="step-text">See which programs you likely qualify for from <strong>three local partners</strong></div></div>
      <div class="step-row"><div class="step-num">3</div><div class="step-text">Get a <strong>phone number to call</strong> to start your application</div></div>
    </div>
    <button class="btn-cta" onclick="advance('welcome',null)">Get started →</button>
  </div>`;
}
 
function screenROC(){
  return `<div class="q-area">
    <div class="q-label">Your community</div>
    <h2 class="q-text">Do you live in a resident-owned community (ROC) in New Hampshire?</h2>
    <p class="q-hint">A ROC is a manufactured home park where residents own the land together as a cooperative. There are over 150 ROCs across NH. If you're not sure, check with your park manager.</p>
    <button class="ans-btn" onclick="advance('roc','yes')">
      <span class="ans-lbl"><span class="ans-lbl-main">Yes, I live in a NH ROC</span></span>
      <span class="ans-chev">›</span>

    <button class="ans-btn" onclick="advance('roc','no')">
      <span class="ans-lbl"><span class="ans-lbl-main">No</span></span>
      <span class="ans-chev">›</span>
    </button>
  </div>`;
}
 
function screenNotROC(){
  return `<div class="not-roc-wrap">
    <div style="width:52px;height:52px;border-radius:50%;background:var(--brand-s);display:flex;align-items:center;justify-content:center;font-size:24px;">🏡</div>

function screenBenefits(){

    <div class="inc-card">
      <div class="inc-lbl">Income limit for a ${sz}-person home</div>
      <div class="inc-amt">${fmt(lim)}<span style="font-size:15px;font-family:'DM Sans',sans-serif;font-weight:400;opacity:.55">&nbsp;/ year</span></div>
      <div class="inc-mo">About ${fmt(Math.round(lim/12))} per month</div>
    </div>
    <button class="ans-btn" onclick="advance('income','below')">
      <span class="ans-lbl">
        <span class="ans-lbl-main">Below ${fmt(lim)}</span>
        <span class="ans-lbl-sub">I may qualify for free programs</span>
      </span>
      <span class="ans-chev">›</span>
    </button>
    <button class="ans-btn" onclick="advance('income','above')">
      <span class="ans-lbl">
        <span class="ans-lbl-main">Above ${fmt(lim)}</span>
        <span class="ans-lbl-sub">There may still be options</span>
      </span>
      <span class="ans-chev">›</span>
    </button>
    <button class="ans-btn" onclick="advance('income','notsure')">
      <span class="ans-lbl"><span class="ans-lbl-main">I'm not sure — show me everything</span></span>
      <span class="ans-chev">›</span>
    </button>
  </div>`;
}
 
function screenAge(){
  return `<div class="q-area">
    <div class="q-label">Last question</div>
    <h2 class="q-text">Is anyone in your household 62 years old or older?</h2>
    <p class="q-hint">This opens up an extra federal grant for home repairs — no repayment required.</p>
    <button class="ans-btn" onclick="advance('age','yes')">
      <span class="ans-lbl"><span class="ans-lbl-main">Yes</span></span>
      <span class="ans-chev">›</span>
    </button>
    <button class="ans-btn" onclick="advance('age','no')">
      <span class="ans-lbl"><span class="ans-lbl-main">No</span></span>
      <span class="ans-chev">›</span>

}

      <span class="ans-chev">›</span>

function screenCounty(){
  const btns = COUNTIES.map(c =>
    `<button class="ans-btn" onclick="S.caa=${c.caa};advance('county','${c.name}')">
      <span class="ans-lbl"><span class="ans-lbl-main">${c.name} County</span></span>
      <span class="ans-chev">›</span>
    </button>`
  ).join('');
  return `<div class="q-area">
    <div class="q-label">Your county</div>
    <h2 class="q-text">Which county do you live in?</h2>
    <p class="q-hint">This tells us which Community Action Agency serves your area so we can give you the right phone number.</p>
    ${btns}
  </div>`;
}
 
function screenResults(){
  const a = S.answers;
  const free     = a.benefits==='yes' || a.income==='below' || a.income==='notsure';
  const above    = a.income==='above' && a.benefits!=='yes';
  const senior   = a.age==='yes';
  let html = `<div class="res-intro">
    <span class="res-eyebrow">Your weatherization options</span>
    <h2 class="res-h">${free ? 'You may qualify for free home improvements' : 'Here are your options'}</h2>
    <p class="res-sub">${free

      : 'Your income may be above the free-program limit, but you still have real options through our local partners.'
    }</p>
  </div>`;
 
  /* ── 1: CAP Agency ── */
  if(free){
    html += `<div class="group-card green">
      <div class="gc-head">
        <div class="gc-icon">🏛️</div>
        <div class="gc-head-text">
          <div class="gc-who">Step 1 · CAP Agency</div>
          <div class="gc-prog">Free Weatherization (WAP)</div>
        </div>
      </div>
      <div class="gc-body">
        <span class="gc-badge">Free grant — no repayment</span>
        <p class="gc-what">Your local Community Action Agency (CAP) is the starting point. They check your eligibility and apply for federal weatherization funding on your behalf.</p>
        <ul class="gc-list">
          <li>Income eligibility check — usually one visit</li>
          <li>Application for WAP federal weatherization grant (up to $20,000)</li>

          <div style="font-size:20px;font-weight:500;color:var(--brand);margin-bottom:2px">📞 ${CAAS[S.caa].phone}</div>
          <div style="font-size:12px;color:var(--mu)">Monday – Friday &nbsp;·&nbsp; 8:30 am – 4:30 pm</div>
        </div>
      </div>
      <div class="gc-action">→ Call this number first to start your application.</div>
    </div>`;
 
    /* flow connector */
    html += `<div class="flow-conn">
      <div class="flow-line"></div>
      <div class="flow-label">then connects you with</div>
      <div class="flow-line"></div>
    </div>`;
 
    /* ── Fuel Assistance (FAP) — shown for free/eligible cohort ── */
    html += `<div class="group-card green">
      <div class="gc-head">
        <div class="gc-icon">🔥</div>
        <div class="gc-head-text">
          <div class="gc-who">Also through CAP Agency</div>
          <div class="gc-prog">Fuel Assistance Program (FAP / LIHEAP)</div>
        </div>
      </div>
      <div class="gc-body">
        <span class="gc-badge">Free grant — $100 to $2,177 — no repayment</span>
        <p class="gc-what">Based on your income, you likely also qualify for the Fuel Assistance Program — a separate grant that pays your heating bill directly to your fuel vendor. This is in addition to weatherization improvements.</p>
        <ul class="gc-list">
          <li>Covers oil, propane, natural gas, wood, or electric heat</li>
          <li>Paid directly to your fuel vendor — not a loan</li>
          <li>Open October 1 through April 30 each year</li>
          <li>Apply at the same time as your weatherization application</li>
        </ul>
      </div>
      <div class="gc-action">→ Ask your CAP Agency to apply for Fuel Assistance at the same appointment.</div>
    </div>`;
  } else {
    html += `<div class="group-card muted">
      <div class="gc-head">
        <div class="gc-icon">🏛️</div>
        <div class="gc-head-text">
          <div class="gc-who">CAP Agency</div>
          <div class="gc-prog">Weatherization Program — apply anyway</div>
        </div>
      </div>
      <div class="gc-body">
        <span class="gc-badge">Worth applying — CAP makes the final call</span>
        <p class="gc-what">Even above the income limit, it's worth calling your CAP Agency. Some income types aren't fully counted. The determination is theirs to make, not this tool's.</p>
        <div style="background:var(--bg);border:1px solid var(--br);border-radius:10px;padding:12px 14px;margin-top:4px">
          <div style="font-size:13px;font-weight:500;color:var(--tx);margin-bottom:6px">${CAAS[S.caa].name}</div>
          <div style="font-size:20px;font-weight:500;color:var(--tx);margin-bottom:2px">📞 ${CAAS[S.caa].phone}</div>
          <div style="font-size:12px;color:var(--mu)">Monday – Friday &nbsp;·&nbsp; 8:30 am – 4:30 pm</div>
        </div>
      </div>
      <div class="gc-action">→ Call this number to start your application.</div>
    </div>`;
  }
 
  /* ── 2: Utility Company ── */
  html += `<div class="group-card ${free?'green':'muted'}">
    <div class="gc-head">
      <div class="gc-icon">⚡</div>
      <div class="gc-head-text">
        <div class="gc-who">Step 2 · Utility Company (NHSaves)</div>
        <div class="gc-prog">${free ? 'Home Energy Assistance (HEA) — free' : 'Home Energy Performance — rebates'}</div>
      </div>
    </div>
    <div class="gc-body">
      ${free
        ? `<span class="gc-badge">Free — 100% of costs covered</span>
           <p class="gc-what">Your electric utility (Eversource, Liberty, Unitil, or NHEC) funds additional improvements through the NHSaves program. This works alongside WAP — the same eligibility, more funding stacked on top.</p>
           <ul class="gc-list">
             <li>Underbelly insulation specific to manufactured homes</li>
             <li>Heating system upgrade or replacement</li>
             <li>Air sealing, energy-efficient appliances</li>
             <li>Health and safety checks included</li>
           </ul>`
        : `<span class="gc-badge">Rebates up to $6,000 — not free, but significant</span>
           <p class="gc-what">Even if you're over the income limit, NHSaves Home Energy Performance offers meaningful rebates for weatherization work. Your utility covers a portion of the costs.</p>
           <ul class="gc-list">
             <li>Up to $6,000 in rebates toward insulation and air sealing</li>
             <li>Low-interest financing (1%) available for larger projects</li>
             <li>Starts with a home energy audit</li>

  html += `<div class="flow-conn">
    <div class="flow-line"></div>
    <div class="flow-label">audit and work done by</div>

  html += `<div class="group-card green">
    <div class="gc-head">

        <div class="gc-who">Step 3 · Resilient Buildings Group</div>
        <div class="gc-prog">Energy Audit + Home Improvements</div>

      <span class="gc-badge">BPI-certified contractor — NHSaves approved</span>

      <ul class="gc-list">
        <li>Comprehensive home energy audit — they come to you</li>
        <li>Customized improvement plan for your manufactured home</li>
        <li>Installation of insulation, air sealing, heating upgrades</li>
        <li>Engaged through your utility or CAP program — no separate application</li>
      </ul>
    </div>
    <div class="gc-action">→ RBG is assigned automatically once you apply through CAP or NHSaves. Or contact them directly: <strong>(603) 226-1009</strong><div class="gc-link"><a href="https://rbgnh.com" target="_blank" rel="noopener noreferrer">rbgnh.com ↗</a></div></div>
  </div>`;
 
  /* ── USDA Section 504 ── */
  if(senior){
    html += `<div class="group-card amber" style="margin-top:8px">
      <div class="gc-head">
        <div class="gc-icon">🏦</div>
        <div class="gc-head-text">
          <div class="gc-who">Additional · USDA (age 62+)</div>
          <div class="gc-prog">Section 504 Home Repair Grant</div>

      </div>
      <div class="gc-body">
        <span class="gc-badge">Up to $10,000 grant — no repayment</span>
        <p class="gc-what">Because someone in your home is 62 or older, you may qualify for a separate federal grant for health and safety repairs including heating. Many NH ROCs are in USDA rural areas — your CAP Agency can help you check.</p>
        <p class="gc-what" style="margin-top:6px">You can also stack this with a low-interest loan (1%, 20 years) for larger projects up to $50,000 total.</p>
      </div>
      <div class="gc-action">→ Ask your CAP Agency about USDA Section 504, or find your local USDA office:<div class="gc-link"><a href="https://www.rd.usda.gov/programs-services/single-family-housing-programs/single-family-housing-repair-loans-grants/nh" target="_blank" rel="noopener noreferrer">rd.usda.gov/nh ↗</a></div></div>
    </div>`;
  } else {
    html += `<div class="note"><strong>Age 62 or older?</strong> A USDA Section 504 grant (up to $10,000, no repayment) may also be available for health and safety repairs. Ask your CAP Agency.</div>`;
  }
 
  /* ── Eversource Enhanced HEP ── */
  if(a.eversource==='yes'){
    html += `<div class="group-card green" style="margin-top:8px">
      <div class="gc-head">
        <div class="gc-icon">⚡</div>
        <div class="gc-head-text">
          <div class="gc-who">Additional · Eversource</div>
          <div class="gc-prog">Enhanced Home Energy Performance (HEP)</div>
        </div>
      </div>
      <div class="gc-body">
        <span class="gc-badge">No-cost services — income up to 100% state median</span>
        <p class="gc-what">As an Eversource customer, you may qualify for their Enhanced Home Energy Performance program even if your income is above the standard free weatherization limit. This program extends eligibility up to 100% of the New Hampshire State Median Income.</p>
        <ul class="gc-list">
          <li>Health and safety checks at no cost</li>
          <li>Air sealing and insulation upgrades</li>
          <li>Energy-efficient heating, cooling, and water heating equipment</li>
          <li>Select energy-efficient product replacements</li>
        </ul>
      </div>
      <div class="gc-action">→ Contact Eversource or your CAP Agency to check eligibility.<div class="gc-link"><a href="https://www.eversource.com/residential/save-money-energy/energy-efficiency-programs/new-hampshire-home-energy-performance/income-eligible-energy-efficiency-nh" target="_blank" rel="noopener noreferrer">eversource.com/nh-income-eligible ↗</a></div></div>
    </div>`;
  }
 
  /* ── Financing Options ── */
  html += `<div class="group-card blue" style="margin-top:4px">
    <div class="gc-head">
      <div class="gc-icon">💰</div>
      <div class="gc-head-text">
        <div class="gc-who">Financing options · Any income level</div>
        <div class="gc-prog">Loans for What Grants Don't Cover</div>
      </div>
    </div>
    <div class="gc-body">

        <div style="font-size:15px;font-weight:500;color:var(--tx);margin-bottom:6px">Welcome Home Improvement Loan</div>
        <p style="font-size:13px;color:var(--mu);line-height:1.6;margin-bottom:8px">Designed specifically for ROC members. Fixed rate, flexible terms up to 30 years, no minimum credit score, and a team with deep experience in manufactured home lending.</p>
        <div style="font-size:13px;font-weight:500;color:var(--blue);">📞 (603) 224-6669, option 1 &nbsp;·&nbsp; Mon–Fri 8am–5pm</div>
        <div style="margin-top:6px"><a href="https://communityloanfund.org/loans-and-services/manufactured-home-owners/welcome-home-loans-refinancing-and-home-equity" target="_blank" rel="noopener noreferrer" style="font-size:15px;font-weight:500;color:var(--blue);text-decoration:underline;text-underline-offset:3px;">communityloanfund.org ↗</a></div>
      </div>
 
      <div style="border:1px solid var(--blue-b);border-radius:10px;padding:14px;background:var(--wh)">
        <div style="font-size:12px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--blue);margin-bottom:4px">NHSaves Utility Partners</div>
        <div style="font-size:15px;font-weight:500;color:var(--tx);margin-bottom:6px">Home Energy Performance Loan</div>
        <p style="font-size:13px;color:var(--mu);line-height:1.6;margin-bottom:8px">NHSaves utility partners offer access to low-interest financing for approved weatherization work — insulation, air sealing, and heating upgrades. Rates may be lower than standard personal loans, and the loan is tied directly to your project.</p>
        <ul style="font-size:13px;color:var(--mu);line-height:1.6;padding-left:16px;margin-bottom:8px">
          <li>Available to Eversource, Liberty, Unitil, and NHEC customers</li>
          <li>Must be participating in the Home Energy Performance program</li>
          <li>Ask your utility or CAP Agency for a loan authorization form</li>
        </ul>
        <div style="margin-top:6px"><a href="https://nhsaves.com/residential/weatherization/" target="_blank" rel="noopener noreferrer" style="font-size:15px;font-weight:500;color:var(--blue);text-decoration:underline;text-underline-offset:3px;">nhsaves.com ↗</a></div>
      </div>
    </div>
  </div>`;
 
  /* CAA finder — pre-selected from county question */
  const caa = CAAS[S.caa];
  const county = S.answers.county || '';
  html += `<div class="caa-box" style="margin-top:18px">
    <div class="caa-title">Your CAP Agency</div>
    <p class="caa-intro">This is your first call. They handle WAP applications and connect you to utility programs — one contact, multiple programs.</p>
    <div class="caa-result">
      <div class="caa-rname">${caa.name}</div>
      <div style="font-size:11px;opacity:.5;margin-bottom:8px">Serving ${county} County</div>
      <div class="caa-rphone">📞 ${caa.phone}</div>
      <div class="caa-rhours">Monday – Friday &nbsp;·&nbsp; 8:30 am – 4:30 pm</div>
    </div>
    <div class="caa-script">"I live in a resident-owned community and I'd like to apply for the Weatherization Assistance Program."</div>
    <button class="ghost-btn" style="color:rgba(255,255,255,.5);margin-top:8px;font-size:12px;" onclick="S.step='county';S.history.push({step:'results',answers:JSON.parse(JSON.stringify(S.answers))});render();">Wrong county? Go back and change it</button>
  </div>
  <div class="note"><strong>What to bring when you call:</strong> A recent utility bill, proof of income (pay stubs, Social Security letter, or tax return), and your Social Security number. They'll give you a full checklist.</div>
  <button class="restart-btn" onclick="startOver()">Start over ↺</button>
  <p class="foot-disc">General guidance only. Your CAP Agency makes the final eligibility determination. Income thresholds updated March 2025. Not legal or financial advice.</p>`;
 
  return html;
}
 
/* ── RENDER ── */
function render(){
  const screens = { welcome:screenWelcome, roc:screenROC, not_roc:screenNotROC,
    benefits:screenBenefits, size:screenSize, income:screenIncome,
    eversource:screenEversource, age:screenAge, county:screenCounty, results:screenResults };
  const fn = screens[S.step];
  if(!fn){ console.error('unknown step',S.step); return; }
  const app = document.getElementById('app');
  app.innerHTML = hdr() + prog() +
    `<div class="screen ${S.dir==='back'?'rev':''}" role="region" aria-label="Current step">` + fn() + `</div>`;
  requestAnimationFrame(()=>{
    const f = app.querySelector('.ans-btn,.size-btn,.btn-cta,.link-btn');
    if(f) f.focus({ preventScroll:true });
  });
}
 
render();
</script>
</body>
</html>
